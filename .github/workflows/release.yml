name: Release packages

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            generator: DEB;RPM
            pattern: '*.deb *.rpm'
            deps: sudo apt-get update && sudo apt-get install -y rpm
          - os: macos-latest
            generator: DragNDrop
            pattern: '*.dmg'
            deps: ''
          - os: windows-latest
            generator: WIX
            pattern: '*.msi'
            deps: choco install wixtoolset -y

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        if: matrix.deps != ''
        run: ${{ matrix.deps }}

      - name: Configure
        run: cmake -B _build -DCPACK_GENERATOR="${{ matrix.generator }}"

      - name: Build
        run: cmake --build _build --config Release

      - name: Package
        working-directory: _build
        run: cpack -G "${{ matrix.generator }}" -C Release

      - name: Upload artifacts (temp)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: _build/${{ matrix.pattern }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
